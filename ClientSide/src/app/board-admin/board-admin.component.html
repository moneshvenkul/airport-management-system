<div class="admin-board">
  <header class="admin-header">
    <h1>Admin Board</h1>
    <p>Manage fleet assets, pilots, and hangars from a single command center.</p>
  </header>

  <nav class="admin-actions">
    <a routerLink="addplanes" class="btn btn-danger" role="button" routerLinkActive="active">Add Planes</a>
    <a routerLink="viewplanes" class="btn btn-info" role="button" routerLinkActive="active">View Planes</a>
    <a routerLink="addpilots" class="btn btn-danger" role="button" routerLinkActive="active">Add Pilots</a>
    <a routerLink="viewpilots" class="btn btn-info" role="button" routerLinkActive="active">View Pilots</a>
    <a routerLink="addhangars" class="btn btn-danger" role="button" routerLinkActive="active">Add Hangars</a>
    <a routerLink="viewhangars" class="btn btn-info" role="button" routerLinkActive="active">View Hangars</a>
  </nav>

  <section class="admin-managers">
    <div class="admin-managers-header">
      <h2>Manager Accounts</h2>
      <button type="button" class="btn btn-outline-light btn-sm" (click)="toggleManager()">
        {{ togglemanager ? 'Show Managers' : 'Hide Managers' }}
      </button>
    </div>

    <div [hidden]="togglemanager">
      <div class="manager-grid">
        <div *ngFor="let manager of managers | async | paginate: { itemsPerPage: count, currentPage: p }">
          <app-managers-list [manager]="manager"></app-managers-list>
        </div>
      </div>

      <div class="text-right">
        <pagination-controls (pageChange)="p = $event"></pagination-controls>
      </div>

      <div>
        <button type="button" class="btn btn-danger" (click)="deleteUsers()">Delete All</button>
      </div>
    </div>
  </section>
</div>
